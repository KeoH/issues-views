<div class="week-navigation-container">
  <button type="button" class="btn btn-secondary btn-icon touch-target-expand" (click)="prevWeek()" [title]="'Semana anterior' | translate:translationService.currentLang()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <span class="current-week-label">{{ getFormattedWeekRange() }}</span>
  <button type="button" class="btn btn-secondary" (click)="goToCurrentWeek()">{{ 'Hoy' | translate:translationService.currentLang() }}</button>
  <button type="button" class="btn btn-secondary btn-icon touch-target-expand" (click)="nextWeek()" [title]="'Semana siguiente' | translate:translationService.currentLang()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>
</div>

<div class="zoom-group">
  <button class="btn btn-secondary btn-icon touch-target-expand" (click)="zoomOut()" [title]="'Reducir escala (Zoom -)' | translate:translationService.currentLang()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
  <button class="btn btn-secondary btn-zoom-reset" (click)="resetZoom()" [title]="'Restablecer zoom a 100%' | translate:translationService.currentLang()">
    {{ (zoom() * 100).toFixed(0) }}%
  </button>
  <button class="btn btn-secondary btn-icon touch-target-expand" (click)="zoomIn()" [title]="'Ampliar escala (Zoom +)' | translate:translationService.currentLang()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</div>
